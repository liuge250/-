<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI传奇 - 下载</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a0a1a 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .logo {
      font-size: 48px;
      font-weight: bold;
      background: linear-gradient(135deg, #ff6b35, #ffd700);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin: 30px 0 10px;
      text-align: center;
    }
    .subtitle {
      color: #aaa;
      font-size: 16px;
      margin-bottom: 30px;
    }
    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 30px;
      max-width: 400px;
      width: 100%;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
    }
    .card h2 {
      font-size: 20px;
      margin-bottom: 15px;
      color: #ffd700;
    }
    .qr-container {
      background: #fff;
      border-radius: 12px;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 15px 0;
    }
    #qrcode {
      width: 200px;
      height: 200px;
    }
    .steps {
      list-style: none;
      padding: 0;
    }
    .steps li {
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .steps li:last-child { border-bottom: none; }
    .step-num {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #ff6b35, #ffd700);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 14px;
      flex-shrink: 0;
    }
    .platforms {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }
    .platform {
      text-align: center;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      min-width: 80px;
    }
    .platform-icon {
      font-size: 32px;
      margin-bottom: 5px;
    }
    .platform-name {
      font-size: 12px;
      color: #aaa;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #ff6b35, #ffd700);
      color: #000;
      font-weight: bold;
      font-size: 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-top: 15px;
    }
    .btn:active { opacity: 0.8; }
    .footer {
      margin-top: 30px;
      color: #666;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="logo">AI 传奇</div>
  <div class="subtitle">AI时代的玛法大陆，等你来战</div>
  
  <div class="platforms">
    <div class="platform">
      <div class="platform-icon">🤖</div>
      <div class="platform-name">Android</div>
    </div>
    <div class="platform">
      <div class="platform-icon">🍎</div>
      <div class="platform-name">iOS</div>
    </div>
    <div class="platform">
      <div class="platform-icon">📱</div>
      <div class="platform-name">HarmonyOS</div>
    </div>
  </div>
  
  <div class="card">
    <h2>📲 扫码安装</h2>
    <div class="qr-container">
      <canvas id="qrcode"></canvas>
    </div>
    <p style="text-align:center; color:#aaa; font-size:14px;">
      用手机浏览器扫描二维码<br>或在浏览器中输入下方地址
    </p>
    <p style="text-align:center; color:#ffd700; font-size:12px; word-break:break-all; margin-top:10px;" id="gameUrl">
      加载中...
    </p>
  </div>
  
  <div class="card">
    <h2>📖 安装步骤</h2>
    <ol class="steps">
      <li>
        <span class="step-num">1</span>
        <span>用手机浏览器（Chrome/Safari/华为浏览器）打开上方链接</span>
      </li>
      <li>
        <span class="step-num">2</span>
        <span>点击浏览器菜单中的 <b>"添加到主屏幕"</b> 或 <b>"安装应用"</b></span>
      </li>
      <li>
        <span class="step-num">3</span>
        <span>确认安装，桌面会出现 <b>"AI传奇"</b> 图标</span>
      </li>
      <li>
        <span class="step-num">4</span>
        <span>点击图标即可像原生APP一样畅玩！</span>
      </li>
    </ol>
  </div>
  
  <a href="/mir-game/" class="btn">🎮 直接进入游戏</a>
  
  <div class="footer">
    <p>AI传奇 v1.0 | 支持 Android / iOS / HarmonyOS</p>
    <p style="margin-top:5px;">无需应用商店，浏览器即可安装</p>
  </div>
  
  <!-- QR Code 生成库 -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script>
    // 获取当前域名并生成QR码
    const gameUrl = window.location.origin + '/mir-game/';
    document.getElementById('gameUrl').textContent = gameUrl;
    
    // 生成QR码
    const canvas = document.getElementById('qrcode');
    if (typeof QRCode !== 'undefined') {
      QRCode.toCanvas(canvas, gameUrl, {
        width: 200,
        margin: 2,
        color: { dark: '#1a0a2e', light: '#ffffff' }
      }, function(error) {
        if (error) {
          console.error('QR码生成失败:', error);
          // 降级方案：使用API生成
          canvas.outerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(gameUrl) + '" width="200" height="200">';
        }
      });
    } else {
      // CDN加载失败，使用API生成
      canvas.outerHTML = '<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(gameUrl) + '" width="200" height="200">';
    }
  </script>
</body>
</html>
